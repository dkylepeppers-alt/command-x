<div id="cx-ext-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>📱 Command-X Phone</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_enabled">
                    <input id="cx_enabled" type="checkbox" />
                    <span>Show phone panel</span>
                </label>
            </div>
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_style_commands">
                    <input id="cx_style_commands" type="checkbox" />
                    <span>Style {{COMMAND}} syntax in chat</span>
                </label>
            </div>
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_show_lockscreen">
                    <input id="cx_show_lockscreen" type="checkbox" />
                    <span>Start on lock screen</span>
                </label>
            </div>
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_ext_batch_mode">
                    <input id="cx_ext_batch_mode" type="checkbox" />
                    <span>Enable batch send mode by default</span>
                </label>
            </div>
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_ext_auto_detect_npcs">
                    <input id="cx_ext_auto_detect_npcs" type="checkbox" />
                    <span>Auto-detect NPCs from [status] tags</span>
                </label>
            </div>
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_set_private_hybrid">
                    <input id="cx_set_private_hybrid" type="checkbox" />
                    <span>Enable manual hybrid private texting</span>
                </label>
            </div>
            <div class="cx-opt">
                <label for="cx_ext_openclaw_mode"><span>Default OpenClaw mode</span></label>
                <select id="cx_ext_openclaw_mode" class="text_pole">
                    <option value="observe">observe</option>
                    <option value="assist">assist</option>
                    <option value="operate">operate</option>
                </select>
            </div>
            <hr />
            <small>Persistent phone panel on the right side of the screen. Includes Command-X messaging, contact profiles, in-phone settings, and the embedded OpenClaw bridge controls.</small>
        </div>
    </div>
</div>
