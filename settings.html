<div id="cx-ext-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>📱 Command-X Phone</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_enabled">
                    <input id="cx_enabled" type="checkbox" />
                    <span>Show phone panel</span>
                </label>
            </div>
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_style_commands">
                    <input id="cx_style_commands" type="checkbox" />
                    <span>Style {{COMMAND}} syntax in chat</span>
                </label>
            </div>
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_show_lockscreen">
                    <input id="cx_show_lockscreen" type="checkbox" />
                    <span>Start on lock screen</span>
                </label>
            </div>
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_ext_batch_mode">
                    <input id="cx_ext_batch_mode" type="checkbox" />
                    <span>Enable batch send mode by default</span>
                </label>
            </div>
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_ext_auto_detect_npcs">
                    <input id="cx_ext_auto_detect_npcs" type="checkbox" />
                    <span>Auto-detect NPCs from [status] tags</span>
                </label>
            </div>
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_set_private_hybrid">
                    <input id="cx_set_private_hybrid" type="checkbox" />
                    <span>Enable manual hybrid private texting</span>
                </label>
            </div>
            <div class="cx-opt">
                <label for="cx_ext_contacts_every_n"><span>Inject [status] every N turns (1 = every turn)</span></label>
                <input id="cx_ext_contacts_every_n" type="number" min="1" max="20" step="1" class="text_pole" />
            </div>
            <div class="cx-opt">
                <label for="cx_ext_quests_every_n"><span>Inject [quests] every N turns (1 = every turn)</span></label>
                <input id="cx_ext_quests_every_n" type="number" min="1" max="20" step="1" class="text_pole" />
            </div>
            <div class="cx-opt">
                <label for="cx_ext_auto_private_poll_n"><span>Auto-poll private messages every N turns (0 = off)</span></label>
                <input id="cx_ext_auto_private_poll_n" type="number" min="0" max="20" step="1" class="text_pole" />
            </div>
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_ext_track_locations">
                    <input id="cx_ext_track_locations" type="checkbox" />
                    <span>Track contact locations on the Map app</span>
                </label>
            </div>
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_ext_auto_register_places">
                    <input id="cx_ext_auto_register_places" type="checkbox" />
                    <span>Allow LLM to auto-register new places via [place] tag</span>
                </label>
            </div>
            <div class="cx-opt">
                <label class="checkbox_label" for="cx_ext_show_trails">
                    <input id="cx_ext_show_trails" type="checkbox" />
                    <span>Show movement trails on the Map</span>
                </label>
            </div>
            <div class="cx-opt">
                <label for="cx_ext_map_every_n"><span>Inject map context every N turns (1 = every turn)</span></label>
                <input id="cx_ext_map_every_n" type="number" min="1" max="20" step="1" class="text_pole" />
            </div>
            <hr />
            <b>✴︎ Nova Agent</b>
            <div class="cx-opt">
                <label for="cx_nova_profile"><span>Connection profile (required for Nova)</span></label>
                <input id="cx_nova_profile" type="text" class="text_pole" placeholder="e.g. GPT-4o Mini" />
            </div>
            <div class="cx-opt">
                <label for="cx_nova_default_tier"><span>Default permission tier</span></label>
                <select id="cx_nova_default_tier" class="text_pole">
                    <option value="read">Read — tool reads only</option>
                    <option value="write">Write — reads + writes (approval-gated)</option>
                    <option value="full">Full — adds shell_run (approval-gated)</option>
                </select>
            </div>
            <div class="cx-opt">
                <label for="cx_nova_max_tool_calls"><span>Max tool calls per turn (1–100)</span></label>
                <input id="cx_nova_max_tool_calls" type="number" min="1" max="100" step="1" class="text_pole" />
            </div>
            <div class="cx-opt">
                <label for="cx_nova_turn_timeout_ms"><span>Turn timeout in ms (10000–3600000)</span></label>
                <input id="cx_nova_turn_timeout_ms" type="number" min="10000" max="3600000" step="1000" class="text_pole" />
            </div>
            <div class="cx-opt">
                <label for="cx_nova_plugin_base_url"><span>Bridge plugin base URL</span></label>
                <input id="cx_nova_plugin_base_url" type="text" class="text_pole" placeholder="/api/plugins/nova-agent-bridge" />
            </div>
            <div class="cx-opt">
                <button id="cx_nova_install_preset" type="button" class="menu_button">Install Command-X chat-completion preset</button>
                <small>Copies <code>presets/openai/Command-X.json</code> into your user presets so Nova has a known-good starting config.</small>
            </div>
            <hr />
            <small>Persistent phone panel on the right side of the screen. Includes Command-X messaging, contact profiles, Nova agentic assistant, and in-phone settings.</small>
        </div>
    </div>
</div>
